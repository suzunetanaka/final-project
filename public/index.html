<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>レシピ帳アプリ</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="recipe.css">
</head>
<body>
    <div class="app-shell">
        <header class="app-header">
            <div>
                <h1>レシピ帳アプリ</h1>
            </div>
        </header>

        <nav class="tab-bar" aria-label="画面切り替え">
            <button class="tab-button active" data-view="recommendView">提案</button>
            <button class="tab-button" data-view="favoriteView">レシピ帳</button>
            <button class="tab-button" data-view="recordView">記録</button>
        </nav>

        <main>
            <section class="view-panel active" id="recommendView">
                <form class="recipe-form" id="recommendForm">
                    <div class="form-row">
                        <div class="form-group">
                            <label for="ingredients">使いたい材料</label>
                            <input id="ingredients" name="ingredients" type="text" placeholder="例: 卵、キャベツ、豚肉">
                        </div>
                        <div class="form-group">
                            <label for="craving">食べたいもの</label>
                            <input id="craving" name="craving" type="text" placeholder="例: あっさり、カレー、丼">
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label for="time">調理時間</label>
                            <select id="time" name="time">
                                <option value="～15分">～15分</option>
                                <option value="～30分" selected>～30分</option>
                                <option value="～45分">～45分</option>
                                <option value="～60分">～60分</option>
                                <option value="こだわらない">こだわらない</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="difficulty">難易度</label>
                            <select id="difficulty" name="difficulty">
                                <option value="かんたん" selected>かんたん</option>
                                <option value="ふつう">ふつう</option>
                                <option value="こだわり">こだわり</option>
                                <option value="おまかせ">おまかせ</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="servings">人数</label>
                            <input id="servings" name="servings" type="number" min="1" max="8" value="2">
                        </div>
                    </div>

                    <button class="btn primary-action" type="submit" id="recommendButton">レシピを提案</button>
                </form>

                <div class="status" id="status">条件を入力してレシピを提案できます。</div>
                <div class="loading" id="loading">レシピを考えています...</div>
                <div class="recipe-grid" id="recommendationList"></div>
            </section>

            <section class="view-panel" id="favoriteView">
                <div class="section-heading">
                    <h2>レシピ帳</h2>
                    <p>登録したレシピをもう一度見て、作った記録をつけられます。</p>
                </div>
                <div class="form-group">
                    <label for="favoriteSearch">レシピ帳を検索</label>
                    <input id="favoriteSearch" type="text" placeholder="料理名・カテゴリ・材料で検索">
                </div>
                <div class="recipe-grid" id="favoriteList"></div>
            </section>

            <section class="view-panel" id="recordView">
                <form class="recipe-form" id="recordForm">
                    <input type="hidden" id="recordRecipeId">
                    <input type="hidden" id="recordCategory">

                    <div class="form-row">
                        <div class="form-group">
                            <label for="recordTitle">料理名</label>
                            <input id="recordTitle" type="text" placeholder="例: しょうが焼き定食" required>
                        </div>
                        <div class="form-group">
                            <label for="cookedAt">作った日</label>
                            <input id="cookedAt" type="date">
                        </div>
                    </div>

                    <div class="rating-stack">
                        <div class="form-group">
                            <span class="field-label">味の満足度</span>
                            <input id="satisfaction" type="hidden" value="">
                            <div class="star-rating" data-target="satisfaction" aria-label="味の満足度">
                                <button type="button" data-value="1" aria-label="満足度1"></button>
                                <button type="button" data-value="2" aria-label="満足度2"></button>
                                <button type="button" data-value="3" aria-label="満足度3"></button>
                                <button type="button" data-value="4" aria-label="満足度4"></button>
                                <button type="button" data-value="5" aria-label="満足度5"></button>
                            </div>
                        </div>
                        <div class="form-group">
                            <span class="field-label">作った難易度</span>
                            <input id="actualDifficulty" type="hidden" value="">
                            <div class="star-rating" data-target="actualDifficulty" aria-label="作った難易度">
                                <button type="button" data-value="1" aria-label="難易度1"></button>
                                <button type="button" data-value="2" aria-label="難易度2"></button>
                                <button type="button" data-value="3" aria-label="難易度3"></button>
                                <button type="button" data-value="4" aria-label="難易度4"></button>
                                <button type="button" data-value="5" aria-label="難易度5"></button>
                            </div>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="notes">メモ</label>
                        <textarea id="notes" rows="4" placeholder="感想、次回変えたいこと、家族の反応など"></textarea>
                    </div>

                    <button class="btn primary-action" type="submit">記録を保存</button>
                </form>

                <div class="section-heading">
                    <h2>ここまでの記録<span class="record-count" id="recordCount"></span></h2>
                    <p>作った日、評価、メモを振り返れます。</p>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label for="recordSearch">記録を検索</label>
                        <input id="recordSearch" type="text" placeholder="料理名・カテゴリ・メモで検索">
                    </div>
                    <div class="form-group">
                        <label for="recordSort">並び替え</label>
                        <select id="recordSort">
                            <option value="newest" selected>新しい順</option>
                            <option value="oldest">古い順</option>
                            <option value="satisfaction">満足度が高い順</option>
                        </select>
                    </div>
                </div>
                <div class="journal-list" id="journalList"></div>
            </section>
        </main>
    </div>

    <script>
        const state = {
            recommendations: [],
            records: [],
            favorites: [],
            recipes: [],
            customRecipes: loadCustomRecipesFromStorage(),
        };

        document.addEventListener('DOMContentLoaded', () => {
            document.getElementById('cookedAt').value = new Date().toISOString().slice(0, 10);
            document.getElementById('recommendForm').addEventListener('submit', handleRecommend);
            document.getElementById('recordForm').addEventListener('submit', handleRecordSave);
            document.querySelectorAll('.tab-button').forEach((button) => {
                button.addEventListener('click', () => switchView(button.dataset.view));
            });
            initRatingControls();
            document.getElementById('recordSearch').addEventListener('input', renderJournal);
            document.getElementById('recordSort').addEventListener('change', renderJournal);
            document.getElementById('favoriteSearch').addEventListener('input', renderFavorites);
            setRatingValue('satisfaction', '');
            setRatingValue('actualDifficulty', '');
            loadRecipes();
            loadRecords();
            loadFavorites();
        });

        async function handleRecommend(event) {
            event.preventDefault();
            setLoading(true);

            const payload = {
                ingredients: document.getElementById('ingredients').value.trim(),
                craving: document.getElementById('craving').value.trim(),
                time: document.getElementById('time').value,
                difficulty: document.getElementById('difficulty').value,
                servings: Number(document.getElementById('servings').value),
                count: 3,
            };

            try {
                const response = await fetch('/api/recipes/recommend', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload),
                });

                if (!response.ok) {
                    throw new Error(await readErrorMessage(response));
                }

                const result = await response.json();
                state.recommendations = result.data || [];
                renderRecommendations();
                if (state.recommendations.length > 0) {
                    updateStatus(`${state.recommendations.length}件のレシピを提案しました。`, true);
                } else {
                    updateStatus('AIからレシピ候補が返りませんでした。条件を短くしてもう一度試してください。', false);
                }
            } catch (error) {
                updateStatus(`レシピ提案に失敗しました: ${error.message}`, false);
            } finally {
                setLoading(false);
            }
        }

        async function handleRecordSave(event) {
            event.preventDefault();

            const satisfactionValue = document.getElementById('satisfaction').value;
            const difficultyValue = document.getElementById('actualDifficulty').value;
            const payload = {
                recipeId: document.getElementById('recordRecipeId').value,
                title: document.getElementById('recordTitle').value.trim(),
                category: document.getElementById('recordCategory').value,
                cookedAt: document.getElementById('cookedAt').value,
                satisfaction: Number(satisfactionValue),
                actualDifficulty: difficultyValue,
                notes: document.getElementById('notes').value.trim(),
                adjustments: '',
            };

            if (!payload.title) {
                alert('料理名を入力してください。');
                return;
            }

            if (!satisfactionValue || !difficultyValue) {
                alert('満足度と難易度を選択してください。');
                return;
            }

            try {
                const response = await fetch('/api/recipe-records', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload),
                });

                if (!response.ok) {
                    const error = await response.json();
                    throw new Error(error.error || 'API error');
                }

                resetRecordForm();
                await loadRecords();
                switchView('recordView');
            } catch (error) {
                alert('記録の保存に失敗しました: ' + error.message);
            }
        }

        async function loadRecords() {
            const response = await fetch('/api/recipe-records');
            state.records = await response.json();
            renderJournal();
        }

        async function loadRecipes() {
            const response = await fetch('/api/recipes');
            const recipes = await response.json();
            state.recipes = mergeRecipes(recipes, state.customRecipes);
            renderJournal();
        }

        async function loadFavorites() {
            const response = await fetch('/api/recipe-favorites');
            const favorites = await response.json();
            state.favorites = mergeRecipes(favorites, state.customRecipes);
            renderFavorites();
            renderJournal();
            if (state.recommendations.length > 0) {
                renderRecommendations();
            }
        }

        function renderRecommendations() {
            const list = document.getElementById('recommendationList');
            list.innerHTML = '';

            state.recommendations.forEach((recipe) => {
                list.appendChild(createRecipeCard(getLatestRecipe(recipe), { showReason: false, context: 'recommend' }));
            });
        }

        async function removeFavorite(recipe) {
            if (recipe.isCustomRecipe) {
                state.customRecipes = state.customRecipes.filter((item) => item.id !== recipe.id);
                saveCustomRecipesToStorage();
                state.recipes = state.recipes.filter((item) => item.id !== recipe.id);
                state.favorites = state.favorites.filter((item) => item.id !== recipe.id);
                renderFavorites();
                renderJournal();
                return;
            }

            const response = await fetch(`/api/recipe-favorites/${recipe.id}`, {
                method: 'DELETE',
            });

            if (response.ok) {
                await loadFavorites();
            }
        }

        function renderFavorites() {
            const list = document.getElementById('favoriteList');
            list.innerHTML = '';

            if (state.favorites.length === 0) {
                list.innerHTML = '<p class="empty-state">まだレシピ帳に登録されたレシピがありません。AIで調整したレシピを保存できます。</p>';
                return;
            }

            const filteredFavorites = filterFavorites(state.favorites);

            if (filteredFavorites.length === 0) {
                list.innerHTML = '<p class="empty-state">条件に合うレシピが見つかりませんでした。</p>';
                return;
            }

            filteredFavorites.forEach((recipe) => {
                list.appendChild(createRecipeCard(getLatestRecipe(recipe), { showReason: false, context: 'favorite' }));
            });
        }

        function filterFavorites(favorites) {
            const query = document.getElementById('favoriteSearch').value.trim().toLowerCase();
            if (!query) {
                return favorites;
            }

            return favorites.filter((recipe) => {
                const searchableText = `${recipe.title} ${recipe.category} ${recipe.ingredients.join(' ')}`.toLowerCase();
                return searchableText.includes(query);
            });
        }

        function createRecipeCard(recipe, options) {
            const card = document.createElement('article');
            card.className = 'recipe-card';

            card.innerHTML = `
                <div class="card-topline">
                    <span>${escapeHtml(recipe.category)}</span>
                    <span>${escapeHtml(recipe.time)} / ${escapeHtml(recipe.difficulty)}</span>
                </div>
                <h2>${escapeHtml(recipe.title)}</h2>
                <p class="summary">${escapeHtml(recipe.summary)}</p>
                <div class="tag-list">${recipe.tags.slice(0, 4).map((tag) => `<span>${escapeHtml(labelTag(tag))}</span>`).join('')}</div>
                <div class="info-block">
                    <h3>材料${recipe.servings ? `（${escapeHtml(recipe.servings)}）` : ''}</h3>
                    <p>${escapeHtml(recipe.ingredients.join('、'))}</p>
                </div>
                <div class="info-block recipe-steps">
                    <h3>作り方</h3>
                    <ol>${recipe.steps.map((step) => `<li>${escapeHtml(step)}</li>`).join('')}</ol>
                </div>
            `;

            const actions = document.createElement('div');
            actions.className = 'card-actions';

            if (options.context === 'recommend' || options.context === 'favorite') {
                if (options.context === 'recommend') {
                    const favoriteButton = document.createElement('button');
                    const isFavorited = isRecipeFavorited(recipe);
                    favoriteButton.className = 'ghost-button';
                    favoriteButton.type = 'button';
                    favoriteButton.textContent = isFavorited ? '登録済み' : 'レシピ帳に登録';
                    favoriteButton.disabled = isFavorited;
                    favoriteButton.addEventListener('click', () => saveRecommendedRecipeToFavorites(recipe, favoriteButton));
                    actions.appendChild(favoriteButton);
                }

                const recordButton = document.createElement('button');
                recordButton.className = 'btn compact-button';
                recordButton.type = 'button';
                recordButton.textContent = '作った記録をつける';
                recordButton.addEventListener('click', () => fillRecordForm(recipe));
                actions.appendChild(recordButton);
            }

            if (options.context === 'favorite') {
                const removeButton = document.createElement('button');
                removeButton.className = 'ghost-button';
                removeButton.type = 'button';
                removeButton.textContent = 'レシピ帳から外す';
                removeButton.addEventListener('click', () => removeFavorite(recipe));
                actions.appendChild(removeButton);
            }

            card.appendChild(actions);
            return card;
        }

        function isRecipeFavorited(recipe) {
            const recipeId = recipe.baseRecipeId || recipe.id;
            return state.favorites.some((item) => item.id === recipe.id || item.baseRecipeId === recipeId);
        }

        function saveRecommendedRecipeToFavorites(recipe, button) {
            if (isRecipeFavorited(recipe)) {
                return;
            }

            const originalText = button.textContent;
            button.disabled = true;
            button.textContent = '登録中...';

            try {
                saveFavoriteRecipe(recipe);
                renderRecommendations();
                renderFavorites();
                renderJournal();
                updateStatus(`「${recipe.title}」をレシピ帳に登録しました。`, true);
            } catch (error) {
                alert('レシピ帳への登録に失敗しました: ' + error.message);
                button.disabled = false;
                button.textContent = originalText;
            }
        }

        function fillRecordForm(recipe) {
            document.getElementById('recordRecipeId').value = recipe.id;
            document.getElementById('recordCategory').value = recipe.category;
            document.getElementById('recordTitle').value = recipe.title;
            document.getElementById('cookedAt').value = new Date().toISOString().slice(0, 10);
            setRatingValue('satisfaction', '');
            setRatingValue('actualDifficulty', '');
            switchView('recordView');
        }

        function renderJournal() {
            renderSummary();
            const list = document.getElementById('journalList');
            list.innerHTML = '';

            const filteredRecords = filterAndSortRecords(state.records);

            if (filteredRecords.length === 0) {
                list.innerHTML = state.records.length === 0
                    ? '<p class="empty-state">まだ記録がありません。</p>'
                    : '<p class="empty-state">条件に合う記録が見つかりませんでした。</p>';
                return;
            }

            filteredRecords.forEach((record) => {
                const recipe = findRecipeForRecord(record);
                const recipeBlock = recipe
                    ? `
                        <div class="journal-recipe">
                            <div class="info-block">
                                <h3>材料${recipe.servings ? `（${escapeHtml(recipe.servings)}）` : ''}</h3>
                                <p>${escapeHtml(recipe.ingredients.join('、'))}</p>
                            </div>
                            <details class="info-block recipe-steps">
                                <summary>作り方を見る</summary>
                                <ol>${recipe.steps.map((step) => `<li>${escapeHtml(step)}</li>`).join('')}</ol>
                            </details>
                        </div>
                    `
                    : '';

                const item = document.createElement('article');
                item.className = 'journal-item';
                item.innerHTML = `
                    <div>
                        <div class="journal-meta">${escapeHtml(record.cookedAt)}</div>
                        <h2>${escapeHtml(record.title)}</h2>
                    </div>
                    <div class="journal-ratings">
                        <div><span>満足度</span>${renderStars(record.satisfaction)}</div>
                        <div><span>難易度</span>${renderStars(normalizeDifficultyScore(record.actualDifficulty))}</div>
                    </div>
                    ${recipeBlock}
                    <div class="info-block journal-note">
                        <h3>メモ</h3>
                        <p>${escapeHtml(record.notes || 'メモは未入力です。')}</p>
                    </div>
                    <div class="journal-actions">
                        <button class="ghost-button delete-record-button" type="button">記録を消す</button>
                    </div>
                    ${recipe ? `
                        <div class="adjustment-panel">
                            <label for="adjustmentPrompt-${escapeHtml(record.id)}">AIでレシピを調整</label>
                            <div class="adjustment-controls">
                                <input id="adjustmentPrompt-${escapeHtml(record.id)}" type="text" placeholder="例: しょうゆを控えめにしたい">
                                <button class="btn compact-button adjust-recipe-button" type="button">調整する</button>
                            </div>
                            <div class="adjustment-result" aria-live="polite"></div>
                        </div>
                    ` : ''}
                `;

                const adjustButton = item.querySelector('.adjust-recipe-button');
                if (adjustButton) {
                    adjustButton.addEventListener('click', () => adjustRecipe(record, recipe, item));
                }
                item.querySelector('.delete-record-button').addEventListener('click', () => deleteRecord(record));
                list.appendChild(item);
            });
        }

        function filterAndSortRecords(records) {
            const query = document.getElementById('recordSearch').value.trim().toLowerCase();
            const sortOrder = document.getElementById('recordSort').value;

            let result = records;

            if (query) {
                result = result.filter((record) => {
                    const searchableText = `${record.title} ${record.category} ${record.notes}`.toLowerCase();
                    return searchableText.includes(query);
                });
            }

            result = [...result].sort((a, b) => {
                if (sortOrder === 'oldest') {
                    return new Date(a.cookedAt) - new Date(b.cookedAt);
                }
                if (sortOrder === 'satisfaction') {
                    return Number(b.satisfaction) - Number(a.satisfaction);
                }
                return new Date(b.cookedAt) - new Date(a.cookedAt);
            });

            return result;
        }

        async function deleteRecord(record) {
            if (!confirm(`「${record.title}」の記録を消しますか？`)) {
                return;
            }

            try {
                const response = await fetch(`/api/recipe-records/${encodeURIComponent(record.id)}`, {
                    method: 'DELETE',
                });

                if (!response.ok) {
                    throw new Error(await readErrorMessage(response));
                }

                state.records = state.records.filter((item) => item.id !== record.id);
                await loadRecords();
            } catch (error) {
                alert('記録の削除に失敗しました: ' + error.message);
            }
        }

        async function adjustRecipe(record, recipe, item) {
            const input = item.querySelector('.adjustment-controls input');
            const result = item.querySelector('.adjustment-result');
            const adjustment = input.value.trim();

            if (!adjustment) {
                result.innerHTML = '<p class="empty-state compact">調整したい内容を入力してください。</p>';
                return;
            }

            result.innerHTML = '<p class="empty-state compact">調整中です...</p>';

            try {
                const response = await fetch('/api/recipes/adjust', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        recipeId: recipe.id,
                        recipe,
                        adjustment,
                    }),
                });

                if (!response.ok) {
                    throw new Error(await readErrorMessage(response));
                }

                const adjusted = await response.json();
                renderAdjustedRecipe(result, buildAcceptedRecipe(recipe, adjusted.data));
            } catch (error) {
                result.innerHTML = `<p class="empty-state compact">レシピ調整に失敗しました: ${escapeHtml(error.message)}</p>`;
            }
        }

        function renderAdjustedRecipe(container, recipe) {
            container.innerHTML = `
                <div class="adjusted-recipe">
                    <h3>調整後のレシピ</h3>
                    <p>${escapeHtml(recipe.adjustmentSummary || '')}</p>
                    <div class="info-block">
                        <h3>材料${recipe.servings ? `（${escapeHtml(recipe.servings)}）` : ''}</h3>
                        <p>${escapeHtml((recipe.ingredients || []).join('、'))}</p>
                    </div>
                    <div class="info-block">
                        <h3>作り方</h3>
                        <ol>${(recipe.steps || []).map((step) => `<li>${escapeHtml(step)}</li>`).join('')}</ol>
                    </div>
                    <div class="adjusted-recipe-actions">
                        <button class="btn compact-button apply-adjusted-recipe" type="button">調整版をレシピ帳に保存</button>
                    </div>
                </div>
            `;

            container.querySelector('.apply-adjusted-recipe').addEventListener('click', (event) => {
                applyAdjustedRecipe(recipe, event.currentTarget);
            });
        }

        function buildAcceptedRecipe(originalRecipe, adjustedRecipe) {
            adjustedRecipe = adjustedRecipe || {};

            return {
                ...originalRecipe,
                ...adjustedRecipe,
                id: originalRecipe.id,
                baseRecipeId: originalRecipe.baseRecipeId || originalRecipe.id,
                title: originalRecipe.title,
                category: originalRecipe.category,
                time: originalRecipe.time,
                minutes: originalRecipe.minutes,
                difficulty: originalRecipe.difficulty,
                difficultyLevel: originalRecipe.difficultyLevel,
                summary: adjustedRecipe.adjustmentSummary || originalRecipe.summary,
                tags: originalRecipe.tags || [],
                ingredients: adjustedRecipe.ingredients || originalRecipe.ingredients || [],
                steps: adjustedRecipe.steps || originalRecipe.steps || [],
            };
        }

        async function applyAdjustedRecipe(recipe, button) {
            const originalText = button.textContent;
            button.disabled = true;
            button.textContent = '保存中...';

            try {
                saveCustomRecipe(recipe);
                renderRecommendations();
                renderFavorites();
                renderJournal();
                switchView('favoriteView');
            } catch (error) {
                alert('調整版レシピの保存に失敗しました: ' + error.message);
                button.disabled = false;
                button.textContent = originalText;
            }
        }

        function saveCustomRecipe(recipe) {
            const customRecipe = {
                ...recipe,
                id: `${recipe.baseRecipeId || recipe.id}-custom-${Date.now()}`,
                baseRecipeId: recipe.baseRecipeId || recipe.id,
                title: recipe.title.includes('調整版') ? recipe.title : `${recipe.title}（調整版）`,
                isCustomRecipe: true,
                createdAt: new Date().toISOString(),
            };

            state.customRecipes = [customRecipe, ...state.customRecipes];
            saveCustomRecipesToStorage();
            state.recipes = mergeRecipes(state.recipes, [customRecipe]);
            state.favorites = mergeRecipes(state.favorites, [customRecipe]);
            return customRecipe;
        }

        function saveFavoriteRecipe(recipe) {
            const favoriteRecipe = {
                ...recipe,
                id: recipe.id,
                baseRecipeId: recipe.baseRecipeId || recipe.id,
                isCustomRecipe: true,
                favoritedAt: new Date().toISOString(),
                createdAt: recipe.createdAt || new Date().toISOString(),
            };

            state.customRecipes = [favoriteRecipe, ...state.customRecipes.filter((item) => item.id !== favoriteRecipe.id)];
            saveCustomRecipesToStorage();
            state.recipes = mergeRecipes(state.recipes, [favoriteRecipe]);
            state.favorites = mergeRecipes(state.favorites, [favoriteRecipe]);
            return favoriteRecipe;
        }

        function loadCustomRecipesFromStorage() {
            try {
                const recipes = JSON.parse(localStorage.getItem('customRecipes')) || [];
                return Array.isArray(recipes) ? recipes : [];
            } catch (error) {
                return [];
            }
        }

        function saveCustomRecipesToStorage() {
            localStorage.setItem('customRecipes', JSON.stringify(state.customRecipes));
        }

        function mergeRecipes(recipes, additionalRecipes) {
            const recipeMap = new Map();
            [...recipes, ...additionalRecipes].forEach((recipe) => {
                recipeMap.set(recipe.id, recipe);
            });
            return Array.from(recipeMap.values());
        }

        function renderSummary() {
            const total = state.records.length;
            document.getElementById('recordCount').textContent = `（${total}件）`;
        }

        function findRecipeForRecord(record) {
            return state.recipes.find((item) => item.id === record.recipeId)
                || state.favorites.find((item) => item.id === record.recipeId)
                || state.recommendations.find((item) => item.id === record.recipeId);
        }

        function getLatestRecipe(recipe) {
            const latestRecipe = state.recipes.find((item) => item.id === recipe.id);

            return latestRecipe
                ? {
                    ...recipe,
                    ...latestRecipe,
                    favoritedAt: recipe.favoritedAt,
                }
                : recipe;
        }

        function renderStars(value) {
            const score = clampRating(Number(value) || 0);
            return `<span class="mini-stars" aria-label="${score} / 5">${Array.from({ length: 5 }, (_, index) => (
                `<span class="${index < score ? 'active' : ''}"></span>`
            )).join('')}</span>`;
        }

        function normalizeDifficultyScore(value) {
            const labels = {
                'かんたん': 2,
                'ふつう': 3,
                'むずかしい': 4,
            };
            return labels[value] || Number(value) || 0;
        }

        function clampRating(value) {
            return Math.min(Math.max(Math.round(value), 0), 5);
        }

        function switchView(viewId) {
            document.querySelectorAll('.view-panel').forEach((panel) => {
                panel.classList.toggle('active', panel.id === viewId);
            });
            document.querySelectorAll('.tab-button').forEach((button) => {
                button.classList.toggle('active', button.dataset.view === viewId);
            });
        }

        function resetRecordForm() {
            document.getElementById('recordForm').reset();
            document.getElementById('recordRecipeId').value = '';
            document.getElementById('recordCategory').value = '';
            document.getElementById('cookedAt').value = new Date().toISOString().slice(0, 10);
            setRatingValue('satisfaction', '');
            setRatingValue('actualDifficulty', '');
        }

        function initRatingControls() {
            document.querySelectorAll('.star-rating button').forEach((button) => {
                button.addEventListener('click', () => {
                    const group = button.closest('[data-target]');
                    setRatingValue(group.dataset.target, button.dataset.value);
                });
            });
        }

        function setRatingValue(targetId, value) {
            const input = document.getElementById(targetId);
            input.value = value;

            const group = document.querySelector(`[data-target="${targetId}"]`);
            if (!group) {
                return;
            }

            group.querySelectorAll('button').forEach((button) => {
                const isActive = value && Number(button.dataset.value) <= Number(value);
                button.classList.toggle('active', isActive);
            });
        }

        function setLoading(isLoading) {
            document.getElementById('loading').classList.toggle('show', isLoading);
            document.getElementById('recommendButton').disabled = isLoading;
            if (isLoading) {
                updateStatus('条件に合うレシピを考えています。', false);
            }
        }

        function updateStatus(message, isReady) {
            const status = document.getElementById('status');
            status.textContent = message;
            status.style.color = isReady ? '#166856' : '#9d3b26';
        }

        async function readErrorMessage(response) {
            const text = await response.text();
            if (!text) {
                return `HTTP ${response.status}`;
            }

            try {
                const data = JSON.parse(text);
                return data.error || `HTTP ${response.status}`;
            } catch (error) {
                return text;
            }
        }

        function labelTag(tag) {
            const labels = {
                meat: '肉',
                fish: '魚',
                egg: '卵',
                rice: 'ごはん',
                pasta: 'パスタ',
                vegetable: '野菜',
                soup: 'スープ',
                quick: '時短',
                mild: 'やさしい',
                savory: 'しっかり',
                spicy: 'スパイス',
                creamy: 'クリーム',
                japanese: '和食',
                western: '洋食',
                chinese: '中華',
            };
            return labels[tag] || tag;
        }

        function escapeHtml(value) {
            return String(value)
                .replaceAll('&', '&amp;')
                .replaceAll('<', '&lt;')
                .replaceAll('>', '&gt;')
                .replaceAll('"', '&quot;')
                .replaceAll("'", '&#039;');
        }
    </script>
</body>
</html>
